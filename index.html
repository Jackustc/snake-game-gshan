<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>Snake</h1>
      <div class="hud">
        <span>Score: <strong id="score">0</strong></span>
        <span id="status">Running</span>
      </div>
      <div class="player">
        <label for="player-name">Player</label>
        <input id="player-name" type="text" maxlength="20" placeholder="Enter name" />
        <button id="save-player-btn" type="button">Set</button>
      </div>
      <p class="current-player">Current: <strong id="current-player">Player</strong></p>
      <div class="speed">
        <label for="speed-range">Speed</label>
        <input id="speed-range" type="range" min="60" max="300" step="10" value="300" />
        <span><strong id="speed-value">300</strong> ms</span>
      </div>
      <div id="board" class="board" aria-label="Snake game board"></div>
      <div class="actions">
        <button id="restart-btn" type="button">Restart</button>
        <button id="pause-btn" type="button">Pause</button>
      </div>
      <div class="controls" aria-label="On-screen controls">
        <button data-dir="up" type="button">↑</button>
        <div class="control-row">
          <button data-dir="left" type="button">←</button>
          <button data-dir="down" type="button">↓</button>
          <button data-dir="right" type="button">→</button>
        </div>
      </div>
      <p class="help">Use arrow keys or WASD. Press space to pause/resume.</p>
      <section class="leaderboard" aria-label="Player ranking board">
        <div class="leaderboard-head">
          <h2>Ranking</h2>
          <button id="clear-ranking-btn" type="button">Clear</button>
        </div>
        <ol id="ranking-list"></ol>
      </section>
    </main>
    <script src="./snake.js"></script>
  </body>
</html>
